services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: complyai
      POSTGRES_USER: complyai
      POSTGRES_PASSWORD: complyai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/complyai
      DB_USERNAME: complyai
      DB_PASSWORD: complyai
      JWT_SECRET: change-me-change-me-change-me-change-me
      CORS_ORIGINS: http://localhost:8081
      AI_MODE: mock
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres-data:
